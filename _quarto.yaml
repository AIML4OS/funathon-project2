project:
  type: website
  render:
    - "*.qmd"
website:
  title: "AIML4OS Funathon - Project 2"
  page-navigation: true
  description: "Automatic classification"
  site-url: "https://AIML4OS.github.io/funathon-project2/"
  repo-url: "https://github.com/AIML4OS/funathon-project2"
  repo-actions: [edit, issue]

  open-graph: true

  page-footer:
    right:
    - text: "License"
      href: LICENCE

  navbar:
    align: center
    title: false
    collapse-below: lg
 
    right:
      - icon: github
        href: "https://github.com/AIML4OS/funathon-project2"
        aria-label: GitHub

    left:
      - text: "Introduction"
        href: index.qmd
      - text: "Supervised learning"
        href: 1-ttc.qmd
      - text: "RAG approach"
        href: 2-rag.qmd


format:
  html:
    theme:
      light: [cosmo, custom.scss]
    toc: true
    reference-location: margin
    code-copy: true
    code-overflow: wrap

execute: 
  eval: true
  cache: true
  warning: false
